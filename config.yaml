llm:
  model: gpt-4o-mini
  temperature: 0.1
  max_tokens: 4000

execution:
  max_clarifications: 0
  max_iterations: 14
  logs_dir: logs
  reports_dir: reports

prompts:
  system_prompt_file: prompts/system_prompt.txt
  initial_user_request_file: prompts/initial_user_request.txt
  clarification_response_file: prompts/clarification_response.txt

agents:
  dataset_collection_agent:
    base_class: sgr_agent_core.agents.sgr_tool_calling_agent.SGRToolCallingAgent
    tools:
      - search_huggingface_datasets_tool
      - search_kaggle_datasets_tool
      - download_selected_datasets_tool
      - tavily_fallback_collection_tool
      - write_collection_manifest_tool
      - final_answer_tool

tools:
  search_huggingface_datasets_tool:
    base_class: dataset_agent.tools.SearchHuggingFaceDatasetsTool
  search_kaggle_datasets_tool:
    base_class: dataset_agent.tools.SearchKaggleDatasetsTool
  download_selected_datasets_tool:
    base_class: dataset_agent.tools.DownloadSelectedDatasetsTool
  tavily_fallback_collection_tool:
    base_class: dataset_agent.tools.TavilyFallbackCollectionTool
  write_collection_manifest_tool:
    base_class: dataset_agent.tools.WriteCollectionManifestTool
  final_answer_tool:
    base_class: sgr_agent_core.tools.final_answer_tool.FinalAnswerTool
